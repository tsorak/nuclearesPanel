<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #17171700;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      animation: yank 10s linear infinite;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 1) 0%, rgba(59, 130, 246, 0) 50%);
      z-index: 2;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 1;
      }
    }

    @keyframes yank {

      0% {
        transform: rotate(0deg);
      }

      10% {
        transform: rotate(135deg);
      }

      50% {
        transform: rotate(-135deg);
      }

      60% {
        transform: rotate(-72.5deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }
  </style>
</head>
